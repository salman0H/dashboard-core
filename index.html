<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      Content Security Policy
      - style-src: allow self, inline styles (Tailwind), Google Fonts, and jsDelivr (Tabler Icons CSS)
      - font-src:  allow self, Google Fonts CDN, and jsDelivr (Tabler Icons webfont files)
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self';
        style-src 'self' 'unsafe-inline'
          https://fonts.googleapis.com
          https://cdn.jsdelivr.net;
        font-src 'self'
          https://fonts.gstatic.com
          https://cdn.jsdelivr.net;
        img-src 'self' data:;
        connect-src 'self';
      "
    />

    <!-- Tabler Icons webfont (blocked before the CSP fix above) -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.5.0/tabler-icons.min.css"
    />

    <title>CoreUI</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
